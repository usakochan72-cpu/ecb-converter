<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ECB基準 JPY→EUR 換算ツール</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
    padding: 40px;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    max-width: 520px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
h2 { margin-top: 0; }
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    font-size: 16px;
}
button {
    padding: 8px;
    font-size: 14px;
    background: #007aff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 5px;
}
.copy-rate { background: #34c759; }
.copy-eur { background: #ff9500; }
.result {
    margin-top: 20px;
    padding: 15px;
    background: #f0f0f0;
    border-radius: 6px;
    line-height: 1.6;
}
.success {
    margin-top: 6px;
    font-size: 13px;
    color: #007aff;
}
</style>
</head>
<body>

<div class="container">
<h2>ECB公式基準 JPY → EUR 換算</h2>

<label>日付</label>
<input type="date" id="date">

<label>金額（JPY）</label>
<input type="text" id="amount" placeholder="例: 1,100">

<button onclick="convert()">換算する</button>

<div class="result" id="output"></div>

<div id="buttons" style="display:none;">
    <button class="copy-rate" onclick="copyRate()">レートのみコピー</button><br>
    <button class="copy-eur" onclick="copyEur()">€金額のみコピー</button>
</div>

<div class="success" id="copiedMsg"></div>
</div>

<script>
document.getElementById("date").value =
    new Date().toISOString().split("T")[0];

let rateText = "";
let eurText = "";

async function convert() {
    const date = document.getElementById("date").value;
    let amount = document.getElementById("amount").value;

    if (!date || !amount) {
        alert("日付と金額を入力してください。");
        return;
    }

    amount = amount.replace(/,/g, "");
    amount = parseFloat(amount);

    if (isNaN(amount)) {
        alert("金額が正しくありません。");
        return;
    }

    try {
        const response = await fetch(
            `https://api.frankfurter.dev/${date}?from=JPY&to=EUR`
        );
        const data = await response.json();

        const rate = data.rates.EUR;
        const eur = (amount * rate).toFixed(2);

        rateText = `1 JPY = ${rate.toFixed(6)} EUR`;
        eurText = `€${eur}`;

        document.getElementById("output").innerHTML =
            `<strong>${rateText}</strong><br><br>
            <strong>${amount.toLocaleString()} 円 → ${eurText}</strong>`;

        document.getElementById("buttons").style.display = "block";
        document.getElementById("copiedMsg").innerHTML = "";

    } catch (error) {
        document.getElementById("output").innerHTML =
            "レート取得に失敗しました。日付をご確認ください。";
    }
}

function copyRate() {
    navigator.clipboard.writeText(rateText).then(function() {
        document.getElementById("copiedMsg").innerHTML = "レートをコピーしました。";
    });
}

function copyEur() {
    navigator.clipboard.writeText(eurText).then(function() {
        document.getElementById("copiedMsg").innerHTML = "€金額をコピーしました。";
    });
}
</script>

</body>
</html>
